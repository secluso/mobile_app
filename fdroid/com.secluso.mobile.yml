Builds:
  - versionName: 1.0.0
    versionCode: 41
    commit: 83eceee33c3e970fd2c35c24d098915f8eb01314
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: https://github.com/secluso/mobile_app/releases/download/v%v/app-armeabi-v7a-release.apk
    sudo:
      - apt-get update || apt-get update
      - apt-get install -y build-essential clang cmake pkg-config rustup
    srclibs:
      - flutter@stable
    rm:
      - assets/design/review_front_door_preview.mp4
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - flutterRevision=$(sed -n -E "s/^ARG FLUTTER_REVISION=(.*)$/\\1/p" tool/repro/Dockerfile)
      - '[[ $flutterRevision ]]'
      - git -C $$flutter$$ checkout -f "$flutterRevision"
      - export PUB_CACHE=$(pwd)/.pub-cache
      - export CARGO_HOME="$HOME/.cargo"
      - export RUSTUP_HOME="$HOME/.rustup"
      - export PATH="$HOME/.cargo/bin:$PATH"
      - rustup default 1.90.0
      - rustup target add armv7-linux-androideabi aarch64-linux-android x86_64-linux-android
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scanignore:
      - $$flutter$$/bin/cache
    scandelete:
      - .pub-cache
    build:
      - export CARGO_HOME="$HOME/.cargo"
      - export RUSTUP_HOME="$HOME/.rustup"
      - export PATH="$HOME/.cargo/bin:$PATH"
      - export GRADLE_USER_HOME="$PWD/.gradle-home"
      - export PUB_CACHE=$(pwd)/.pub-cache
      - export SECLUSO_ALLOW_UNSIGNED_RELEASE=1
      - export SECLUSO_FDROID_BUILD=1
      - $$flutter$$/bin/flutter build apk --release --no-pub --split-per-abi --target-platform="android-arm" --dart-define=SECLUSO_FDROID_BUILD=true
