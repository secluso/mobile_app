MaintainerNotes: |
  The F-Droid build is manual rather than a normal Gradle flavor. The build
  recipe below enables the special F-Droid path, emits one APK per ABI, and
  keeps the Android release builds unsigned for F-Droid signing.

  Upload the matching signed APKs to the GitHub release tag v%v using these
  filenames:
    - app-armeabi-v7a-release.apk
    - app-arm64-v8a-release.apk
    - app-x86_64-release.apk

  The app can be pointed at a self-hosted relay from inside the UI, so it is
  not tied to one fixed hosted service.

