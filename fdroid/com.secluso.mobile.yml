# Draft metadata file for proposing Secluso to F-Droid's fdroiddata repo.
# Review the commit, screenshots, and description before opening the MR.
# `$$flutter$$` below is an fdroiddata placeholder, not a local shell path.

Categories:
  - Internet
  - Security
License: GPL-3.0-or-later
AuthorName: Secluso
AuthorWebSite: https://secluso.com
WebSite: https://secluso.com
SourceCode: https://github.com/secluso/mobile_app
IssueTracker: https://github.com/secluso/mobile_app/issues
Changelog: https://github.com/secluso/mobile_app/releases

RepoType: git
Repo: https://github.com/secluso/mobile_app.git
Binaries: https://github.com/secluso/mobile_app/releases/download/v%v-%c/app-release-signed.apk

Builds:
  - versionName: 0.1.0
    versionCode: 3
    commit: 524dbaae2deff0ce6baf098de8bf1af04950c1d8
    sudo:
      - apt-get update || apt-get update
      - apt-get install -y build-essential clang cmake pkg-config rustup
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterRevision=$(sed -n -E "s/^ARG FLUTTER_REVISION=(.*)$/\\1/p" tool/repro/Dockerfile)
      - '[[ $flutterRevision ]]'
      - git -C $$flutter$$ checkout -f "$flutterRevision"
      - export CARGO_HOME="$HOME/.cargo"
      - export RUSTUP_HOME="$HOME/.rustup"
      - export PATH="$HOME/.cargo/bin:$PATH"
      - rustup default 1.90.0
      - rustup target add armv7-linux-androideabi aarch64-linux-android x86_64-linux-android
    build:
      - export CARGO_HOME="$HOME/.cargo"
      - export RUSTUP_HOME="$HOME/.rustup"
      - export PATH="$HOME/.cargo/bin:$PATH"
      - export PUB_CACHE="$PWD/.pub-cache"
      - ./tool/fdroid/build_fdroid_apk.sh "$$flutter$$/bin/flutter"
AllowedAPKSigningKeys: f75eb11b6f59392bd7323748573d71e578541d5bc0fb66f90d41bde89b556f1b

MaintainerNotes: |
  The F-Droid build is manual rather than a normal Gradle flavor. Use the
  build recipe below, which enables the special F-Droid path and keeps the
  Android release build unsigned for F-Droid signing.

  The app can be pointed at a self-hosted relay from inside the UI, so it is
  not tied to one fixed hosted service.

AutoUpdateMode: Version
UpdateCheckMode: Tags ^v[\d.]+-\d+$
CurrentVersion: 0.1.0
CurrentVersionCode: 3
